body:
  text: 東大寺圓超大法師奉聖王敕録上竊以佛教之興也於此有由矣西天之境釋迦能仁駕鹿苑而疏其源東漢之朝孝明皇帝夢金人而尋其蹤我國家奇異之像來濱微言之教聞空磯城嶋金剌宮御宇欽明天皇十三年佛法始傳矣其後至于延喜十四年經三百五十三年其間所傳法藏盡數分教窮派書寫經論競在公私祕顯章疏但任人心或祕不傳或散不寫諸宗章疏漸瀆塞白馬教法無由釋焉伏惟禪定皇帝五百佛前親受付囑一天下中權現王身崇重聖教遠越五天紹隆顯密近倍震旦爰皇帝敕寫傳章疏使六宗碩學進各宗之録圓超苟陪華嚴之末學忝獻自宗及因明録伏憑後哲之正奏耳甲戌之歲四月八日謹序十住毗婆沙論十六卷龍樹菩薩造後秦耶舍三藏共羅什譯出釋十地品至第二地是大不思議論一分也十住論十卷龍樹菩薩造羅什譯十地論十卷天親菩薩造菩提留支譯注十地論二十卷華嚴論六百卷北齊劉謙之述華嚴論百卷見行止五十卷後魏靈辨述法界無差別論一卷堅慧菩薩造提雲般若等譯十地五門實性論六卷釋十地論大乘起信論一卷馬鳴菩薩造真諦三藏譯大乘起信論二卷馬鳴菩薩造真諦三藏譯上二論同本異譯大乘起信論玄文二十卷真諦三藏述大品玄文四卷真諦三藏述九識論二卷真諦三藏述寶性論六卷堅慧菩薩造勒那摩提譯佛地論七卷親光菩薩造玄奘三藏譯金剛三昧論三卷新羅元曉述華嚴經會釋論十四卷新經李通玄述華嚴經探玄記二十卷古經魏國西寺法藏述華嚴刊定記十六卷新經靜法寺慧苑述華嚴疏三十卷新經分本末為六十卷請來録云演義鈔四十卷清涼山大華嚴寺澄觀述華嚴疏十卷古經元曉述華嚴方軌五卷古經至相寺智儼述華嚴疏二十卷新經宗一述華嚴疏十三卷智儼述華嚴疏七卷越州靜林寺法敏述華嚴疏十二卷唐大慈恩寺靈辨述華嚴鈔十卷靈辨述華嚴十地品疏十卷唐并州武德寺慧覺述華嚴疏七卷齊鄴中曇遵述華嚴疏七卷隋西京大興善寺洪遵述華嚴疏七卷未成未講隋西京淨影寺慧遠述華嚴疏十卷唐至相寺智正述華嚴疏十卷唐京師普光寺光覺述華嚴疏七卷魏北臺智炬述華嚴疏五卷齊鄴下大覺寺僧範述又造十地地持維摩勝鬘疏等華嚴疏四卷齊鄴下大覺寺慧光述華嚴疏七卷齊治州曇衍述華嚴義疏未知卷數隋西京空觀寺慧藏感空聲瑞述華嚴疏八卷隋相州演空寺靈祐述又造自餘章疏傳記等總百餘卷現行於代華嚴明難品疏十卷隋西京禪定道場曇遷述華嚴入法界品鈔一卷光統律師述華嚴教分記一卷亦云五教杜順述華嚴綱目一卷元曉述華嚴綱目一卷十門法藏述華嚴旨歸一卷十門法藏述華嚴旨歸一卷靈祐述華嚴旨歸二卷東晉南林法業述華嚴孔目章四卷智儼述華嚴問答二卷智儼述華嚴問答二卷法藏述華嚴玄明要決一卷智儼述華嚴旋復章一部未知卷數慧苑述華嚴三教對辨懸談未知卷數華嚴翻梵語一卷舊經法藏述華嚴梵語及音義一卷新經法藏述華嚴三昧觀一卷十門法藏述華嚴教分記三卷亦名五教章法藏述華嚴玄義章一卷法藏述華嚴八會章一卷法藏述華嚴唯識章一卷法藏述華嚴法界義海一卷法藏述華嚴遊心法界記一卷法藏述華嚴發菩提心義一卷法藏述華嚴關脈義一卷法藏述華嚴文義要決五卷新羅表員述華嚴善財童子諸善知識録一卷彥琮述華嚴佛名二卷華嚴菩薩名一卷華嚴三寶禮一卷十首法藏述華嚴讚禮一卷十首法藏述華嚴普禮法一卷十五禮拜天台顗禪師述華嚴齊記一卷竟陵文宣王述華嚴供養十門儀式一卷智儼述華嚴十玄章一卷智儼承杜順述華嚴回心義一卷華嚴文義略纂一卷頴法師述華嚴十會一卷華嚴品會名圖一卷華嚴法界觀一卷杜順述華嚴法界觀玄鏡一卷澄觀述華嚴普賢行願品疏一卷澄觀述華嚴會請賢聖文一卷華嚴孔目記六卷新羅珍嵩述華嚴骨目一卷新經湛然述華嚴遊意一卷吉藏述華嚴傳五卷法藏述華嚴章三卷大慈恩寺靈辨述蓮華藏世界海觀及彌勒天宮觀一卷靈幹述金師子章一卷法藏述密嚴經疏四卷法藏述般若心經疏一卷法藏述梵網經疏三卷法藏述維摩經疏六卷法銑述楞伽經疏七卷元曉述勝鬘經疏二卷元曉述法華疏六卷光宅寺雲法師述最勝疏八卷勝莊述楞伽心玄記一卷法藏述大乘起信論疏二卷法藏述起信疏一卷古譯論大衍述起信義疏二卷淨影寺慧遠述起信疏二卷元曉述起信疏三卷延法師述起信疏三卷大慈恩寺慧明述起信疏一卷青丘大衍述起信疏一卷曇遷述起信別記一卷法藏述起信別記一卷元曉述起信私記一卷元曉述起信綱要二卷起信記一卷大衍述法界無差別論疏一卷法藏述十地論疏七卷慧遠述佛地論疏六卷靖邁述十二門論疏一卷法藏述中邊分別論疏四卷元曉述大乘義章二十卷續高僧傳云廬山慧遠法師三論華嚴十地品為五聚法謂教義染淨雜因今載此録矣大乘權實義二卷慧苑述大乘止觀一卷曇遷述止觀二卷智者禪師述亦名智顗師會諸宗別見頌一卷杜順述二障章一卷元曉述一道章一卷元曉述自防遺忘集十卷文超述綱目記二卷十門和諍論一卷元曉述海印三昧論一卷明皛述法華宗要一卷元曉述新華嚴經音義二卷慧苑述已上唐書華嚴傳音義一卷慧睿述唯識論同異補闕章二卷東大寺德一述起信論同異章一卷興福寺智憬述五教指事三卷東大寺壽靈述五教私記二卷願圓述維摩經注釋十二卷勢範律師述上卷注中下不注已上和書因明疏并記判比量論一卷元曉述理門論疏二卷圓測述理門疏六卷定賓述理門疏三卷淨眼述理門疏三卷文備述理門古迹一卷太賢述理門注釋一卷文備述入正理論疏三卷基法師述正理疏三卷璧法師述正理疏三卷文軌述正理疏二卷道證述正理疏三卷玄應述正理疏一卷玄範述正理疏二卷清幹述正理述記一卷神泰述正理疏鈔一卷道獻述正理略纂四卷慧沼述正理纂要一卷慧沼述正理義斷一卷慧沼述正理義心一卷道獻述唯識比量遣僞興真章一卷行賀述正理注釋一卷崇俊述廣百論疏十卷文備述廣百論撮要一卷元曉述如實論疏一卷真諦三藏述基疏記三卷雍法師述基疏記三卷智周述基疏記三卷清素述基疏記三卷頴法師述基疏記三卷獻法師述基疏記三卷名有鈔無作名基疏略記一卷智周述基疏後記三卷智周述纂要記一卷如理述纂要記一卷首法師述纂要記一卷周法師述纂要記一卷清法師述纂要記一卷林法師述纂要記一卷憲法師述義斷記一卷清法師述義斷記一卷憲法師述義斷記一卷林法師述義斷記一卷周法師述義斷記一卷擇鄰述已上唐書明燈鈔十二卷善珠僧正述唯識分量決一卷善珠僧正述義骨三卷莊嚴疏末疏也願曉律師述三量撮一卷東大寺長載述勝軍比量集記一卷興福寺願建述六因義集記一卷願建述疏集記六卷願建述纂要集記三卷願建述義斷集記一卷願建述已上和書已上百八十二部七百八十四卷
